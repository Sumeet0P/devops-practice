image: docker:latest

services:
  - docker:dind

stages:
  - build_push
  - deploy

variables:
  DOCKER_DRIVER: overlay2

build-and-push:
  stage: build_push
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

    # Build
    - docker build -t $DOCKER_USERNAME/server:$CI_COMMIT_SHORT_SHA ./app/server
    - docker build -t $DOCKER_USERNAME/client:$CI_COMMIT_SHORT_SHA ./app/client

    # Tag latest
    - docker tag $DOCKER_USERNAME/server:$CI_COMMIT_SHORT_SHA $DOCKER_USERNAME/server:latest
    - docker tag $DOCKER_USERNAME/client:$CI_COMMIT_SHORT_SHA $DOCKER_USERNAME/client:latest

    # Push
    - docker push $DOCKER_USERNAME/server:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_USERNAME/server:latest

    - docker push $DOCKER_USERNAME/client:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_USERNAME/client:latest

deploy:
  stage: deploy
  script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - ssh -o StrictHostKeyChecking=no localhost "
        cd ~/cicd-monitoring &&
        docker compose pull &&
        docker compose up -d
      "    